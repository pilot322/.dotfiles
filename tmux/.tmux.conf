set-option -g prefix C-a
unbind-key C-b # Unbind the default Ctrl-b
bind-key C-a send-prefix # Send Ctrl-a to programs when pressed twice
# wsome shit
set-option -sg escape-time 10
set -g history-limit 10000
set -g base-index 1
set -g pane-base-index 1
setw -g mode-keys vi

# better split
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind r source-file ~/.tmux.conf

# ok
set -g mouse on

# copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

set -s copy-command 'xclip -i -selection clipboard'

# movement
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# no rename
set-option -g allow-rename off

# customies
bind-key K confirm-before -p "Are you sure about this lil bro? (y/n)" "run-shell 'tmux switch-client -n && tmux kill-session -t \"#S\"'"
bind-key E run-shell "~/scripts/quick_edit.sh"
bind-key f display-popup -E "~/.dotfiles/scripts/switch_tmux.sh"


# STYLES
# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
# setw -g clock-mode-colour yellow

# copy mode
setw -g mode-style 'fg=white bg=blue bold'

# panes
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=yellow'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=red'

set -g status-left-length 100    
set -g status-left-style 'fg=yellow' # Style for the right status section text
set -g status-left "-> #S | "

set -g status-right-length 100
set -g status-right-style 'fg=yellow'        # This line is no longer needed, but harmless
set -g status-right ''                       # <--- EMPTIED

setw -g window-status-current-style 'fg=black bg=red'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=red bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow]#F '

setw -g window-status-bell-style 'fg=yellow bg=red bold'

# messages
set -g message-style 'fg=black bg=yellow'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'Chaitanyabsprip/tmux-harpoon'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# tmux-harpoon: drop plugin defaults (C-h, C-S-h) and bind under C-a prefix
unbind -n C-h
unbind -n C-S-h
bind h   run-shell "~/.tmux/plugins/tmux-harpoon/harpoon -l"
bind H   run-shell "~/.tmux/plugins/tmux-harpoon/harpoon -a"
bind M-h run-shell "~/.tmux/plugins/tmux-harpoon/harpoon -A"
bind -n M-e run-shell "~/.tmux/plugins/tmux-harpoon/harpoon -e"
bind -n M-1 run-shell "~/.tmux/plugins/tmux-harpoon/harpoon -s 1"
bind -n M-2 run-shell "~/.tmux/plugins/tmux-harpoon/harpoon -s 2"
bind -n M-3 run-shell "~/.tmux/plugins/tmux-harpoon/harpoon -s 3"
bind -n M-4 run-shell "~/.tmux/plugins/tmux-harpoon/harpoon -s 4"
